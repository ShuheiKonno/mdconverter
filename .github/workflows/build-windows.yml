name: Build Windows .exe

on:
  push:
    branches:
      - claude/markdown-converter-tool-cyOzw
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-windows-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows:
    name: Build mdconverter.exe
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Upgrade pip tooling
        run: python -m pip install --upgrade pip wheel setuptools

      - name: Install project and build deps
        shell: pwsh
        run: |
          pip install -e ".[build]"

      - name: Build with PyInstaller
        shell: pwsh
        run: |
          pyinstaller build/mdconverter.spec --clean --noconfirm --distpath .

      - name: Show build output
        shell: pwsh
        run: |
          Get-Item mdconverter.exe | Format-List Name, Length, LastWriteTime

      - name: Upload .exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: mdconverter-windows-x64
          path: mdconverter.exe
          retention-days: 90
          if-no-files-found: error

      # タグ push (v*) のときだけ GitHub Release を作成して .exe を添付する。
      # 通常のブランチ push では artifact のみで release は作らない。
      - name: Create GitHub Release and attach .exe
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: mdconverter.exe
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
